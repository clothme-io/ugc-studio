services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ugc
      POSTGRES_PASSWORD: ugc
      POSTGRES_DB: ugc_studio
    volumes:
      - ugc_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - ugc_redis:/data

volumes:
  ugc_postgres:
  ugc_redis:
